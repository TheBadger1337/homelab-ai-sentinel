services:
  sentinel:
    build: .
    container_name: homelab-ai-sentinel
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .secrets.env
    depends_on:
      - signal-cli-rest-api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  signal-cli-rest-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-cli-rest-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - signal-data:/home/.local/share/signal-cli
    environment:
      - MODE=native

volumes:
  signal-data:
