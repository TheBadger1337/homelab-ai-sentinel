startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - sentinelUrl
    properties:
      sentinelUrl:
        type: string
        title: "Sentinel URL"
        description: "Base URL of your running Sentinel instance (e.g. http://192.168.1.x:5000)"
      sentinelToken:
        type: string
        title: "Sentinel Token (optional)"
        description: "Your WEBHOOK_SECRET value — only required if Sentinel is configured with a webhook secret"
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["--from", "homelab-ai-sentinel-mcp", "sentinel-mcp"],
      env: {
        SENTINEL_URL: config.sentinelUrl,
        SENTINEL_TOKEN: config.sentinelToken || ""
      }
    })
